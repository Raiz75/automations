<!-- automations\main\templates\_base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Python Project Hub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h1 class="sidebar-title">Python Hub</h1>
            <nav id="project-nav" class="nav">
                <!-- Navigation will be loaded dynamically -->
            </nav>
        </aside>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
        {% include "_partials/bot_panel.html" %}
    </div>
    
    <script>
        // Global configuration
        let currentProjectId = '{{ current_project_id if current_project_id else "" }}';
        
        // Load navigation on DOM ready
        document.addEventListener('DOMContentLoaded', function() {
            loadNavigation(currentProjectId);
        });
    </script>
    
    <script src="{{ url_for('static', filename='js/project_activation.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
