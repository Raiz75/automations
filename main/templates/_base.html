<!-- automations\main\templates\_base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Python Project Hub{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h1 class="sidebar-title">Python Hub</h1>
            <nav id="project-nav" class="nav">
                <!-- Navigation will be loaded dynamically -->
            </nav>
        </aside>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
        <aside class="bot-panel" id="bot-panel">
            <div class="bot-panel-header">
                <span class="bot-icon">🤖</span>
                <span class="bot-title">Console</span>
            </div>
            <div class="bot-panel-output" id="bot-output">
                <span class="line"><span class="timestamp">[ready]</span> $ python hub.py<span class="cursor"></span></span>
            </div>
        </aside>
    </div>
    
    <script>
        // Navigation configuration - loaded from server
        let navConfig = [];
        let currentProjectId = '{{ current_project_id if current_project_id else "" }}';
        
        // Load navigation from API
        function loadNavigation() {
            fetch('/api/navigation')
                .then(r => r.json())
                .then(data => {
                    navConfig = data;
                    renderNavigation();
                })
                .catch(error => {
                    console.error('Failed to load navigation:', error);
                    navConfig = [
                        { id: 'overview', name: 'Overview', url: '/', icon: '🏠' },
                    ];
                    renderNavigation();
                });
        }
        
        function renderNavigation() {
            const nav = document.getElementById('project-nav');
            nav.innerHTML = '';
            
            navConfig.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                if (item.id === currentProjectId || (item.id === 'overview' && !currentProjectId)) {
                    btn.classList.add('active');
                }
                
                const iconSpan = document.createElement('span');
                iconSpan.textContent = item.icon || '•';
                iconSpan.style.marginRight = '8px';
                
                const textSpan = document.createElement('span');
                textSpan.textContent = item.name;
                
                btn.appendChild(iconSpan);
                btn.appendChild(textSpan);
                
                btn.addEventListener('click', () => {
                    if (document.querySelector('.layout.active-mode')) return;
                    if (item.url) {
                        window.location.href = item.url;
                    }
                });
                
                nav.appendChild(btn);
            });
        }
        
        function showToast(msg, type, duration) {
            type = type || 'success';
            duration = duration || 3000;
            let el = document.getElementById('toast');
            if (!el) {
                el = document.createElement('div');
                el.id = 'toast';
                document.body.appendChild(el);
            }
            el.textContent = msg;
            el.className = 'toast ' + type;
            el.classList.add('visible');
            clearTimeout(el._timeout);
            el._timeout = setTimeout(function() { el.classList.remove('visible'); }, duration);
        }

        function botLog(msg) {
            const out = document.getElementById('bot-output');
            if (!out) return;
            const ts = new Date().toLocaleTimeString();
            const cursorSpan = out.querySelector('.cursor');
            if (cursorSpan) cursorSpan.remove();
            const line = document.createElement('span');
            line.className = 'line';
            line.innerHTML = '<span class="timestamp">[' + ts + ']</span> $ ' + msg;
            out.appendChild(line);
            const newCursor = document.createElement('span');
            newCursor.className = 'cursor';
            out.appendChild(newCursor);
            out.scrollTop = out.scrollHeight;
        }

        function enterActiveMode() {
            document.querySelector('.layout').classList.add('active-mode');
            document.getElementById('bot-panel').classList.add('visible');
        }
        
        function exitActiveMode() {
            document.querySelector('.layout').classList.remove('active-mode');
            document.getElementById('bot-panel').classList.remove('visible');
        }
        
        function isActiveMode() {
            return document.querySelector('.layout.active-mode') !== null;
        }
        
        document.addEventListener('DOMContentLoaded', loadNavigation);
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
